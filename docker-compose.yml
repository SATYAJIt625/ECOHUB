version: '3.9'

# ─── EcoHub Docker Compose ────────────────────────────────────────────────────
# Orchestrates: MongoDB, Backend API, Frontend
#
# Usage:
#   docker compose up --build         → Start all services
#   docker compose up -d              → Start in detached mode
#   docker compose exec backend npm run seed  → Seed the database
#   docker compose down -v            → Stop and remove volumes

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: ecohub_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ecohub
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - '27017:27017'         # Expose for local Compass access
    networks:
      - ecohub_net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecohub_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/ecohub
      JWT_SECRET: ${JWT_SECRET:-ecohub_change_this_secret_in_production}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
    ports:
      - '5000:5000'
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ecohub_net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
    container_name: ecohub_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ecohub_net

# ── Networks & Volumes ────────────────────────────────────────────────────────
networks:
  ecohub_net:
    driver: bridge

volumes:
  mongo_data:
    driver: local
